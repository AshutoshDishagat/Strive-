name: strive1
description: "A AI-powered study ecosystem for attention tracking."
publish_to: 'none'
version: 1.0.0+1

# This environment section fixes the 'null safety' error
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # These are the parts for your High-Performance Vision Module
  camera: ^0.11.0
  google_mlkit_face_detection: ^0.11.0
  google_mlkit_image_labeling: ^0.11.0
  sqflite: 2.3.3+2
  path: ^1.8.3
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.1.4
  google_sign_in: ^6.2.1
  firebase_core: ^4.4.0
  cloud_firestore: any
  installed_apps: ^2.1.1
  usage_stats: ^1.1.0
  flutter_foreground_task: ^6.1.1
  google_generative_ai: ^0.4.7
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  share_plus: ^12.0.2
  pdf: ^3.10.8
  shared_preferences: ^2.2.3
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^21.0.0
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21 # android min sdk value

flutter:
  # This ensures icons like 'add_a_photo' work correctly
  uses-material-design: true
  assets:
    - assets/